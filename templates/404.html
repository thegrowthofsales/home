{% extends 'base.html' %}
{% block title %}Page Not Found | The Growth of Sales{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-content" data-aos="zoom-in">
        <div class="error-num">404</div>
        <h2 class="error-title" style="color: var(--white); font-size: 1.8rem; margin-bottom: 12px;">
            Page Not Found
        </h2>
        <p class="error-desc" style="color: var(--white-60); line-height: 1.7; margin-bottom: 28px;">
            The page you're looking for doesn't exist or has been moved.<br>
            Let's take you back to safety.
        </p>
        <a href="{{ url_for('index') }}" class="btn-primary">
            <i class="fas fa-home"></i>
            <span>Back to Home</span>
        </a>
    </div>
</div>
{% endblock %}
